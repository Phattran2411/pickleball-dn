<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Pickleball Petrolimex Đà Nẵng – Giải đấu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:12px;padding-bottom:40px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 14px;gap:8px}
.topbar-title{font-size:14px;font-weight:700;flex:1;min-width:0;line-height:1.3}
.public-badge{display:flex;align-items:center;gap:5px;background:#EAF3DE;color:#27500A;font-size:11px;font-weight:700;padding:5px 10px;border-radius:99px;flex-shrink:0}
.card{background:#fff;border:1px solid #e8e8e0;border-radius:14px;padding:14px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:#888;letter-spacing:.6px;text-transform:uppercase;margin-bottom:12px}
.tabs{display:flex;border-bottom:1px solid #e8e8e0;margin-bottom:14px;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 12px;text-align:center;font-size:13px;color:#888;cursor:pointer;border-bottom:2px solid transparent;font-weight:500;white-space:nowrap}
.tab.on{color:#639922;border-bottom-color:#639922;font-weight:700}
.lb-table{width:100%;border-collapse:collapse;table-layout:fixed}
.lb-table th{font-size:11px;font-weight:700;color:#888;padding:0 0 10px;text-align:center}
.lb-table th.col-name{text-align:left;padding-left:4px}
.lb-table td{padding:8px 0;border-top:1px solid #f0f0ea;text-align:center;font-size:13px;vertical-align:middle}
.lb-table td.col-name{text-align:left;padding-left:4px}
.lb-table tr:first-child td{border-top:none}
.col-rank{width:26px}.col-num{width:44px}.col-pct{width:56px}
.player-cell{display:flex;align-items:center;gap:8px;cursor:pointer}
.player-cell:hover .p-name-txt{color:#639922;text-decoration:underline}
.pct-badge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:12px;font-weight:700}
.pct-high{background:#EAF3DE;color:#27500A}.pct-mid{background:#FAEEDA;color:#633806}
.pct-low{background:#FCEBEB;color:#791F1F}.pct-none{background:#f0f0ea;color:#888}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-c{background:#f5f5f0;border-radius:10px;padding:12px}
.stat-l{font-size:11px;color:#888;margin-bottom:3px}
.stat-v{font-size:22px;font-weight:700}
.match-item{padding:10px 0;border-bottom:1px solid #f0f0ea}
.match-item:last-child{border-bottom:none}
.match-teams{display:flex;align-items:center;gap:6px;font-size:13px;margin-bottom:3px}
.m-score{font-weight:700;padding:2px 8px;background:#f0f0ea;border-radius:8px;flex-shrink:0}
.m-winner{font-size:11px;color:#27500A;font-weight:600}
.m-time{font-size:11px;color:#888}
.live-card{background:#fff;border:1.5px solid #e8e8e0;border-radius:14px;padding:14px;margin-bottom:10px}
.live-card.has-score{border-color:#c5e09a}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:#fff0f0;color:#c0392b;font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;margin-bottom:10px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#e74c3c;animation:blink 1.2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.live-teams{display:flex;align-items:center;gap:8px}
.live-team{flex:1;min-width:0}
.live-team-name{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.live-score-box{background:#f5f5f0;border-radius:10px;padding:6px 12px;text-align:center;flex-shrink:0;min-width:72px}
.live-score-val{font-size:22px;font-weight:800;letter-spacing:2px}
.live-score-lbl{font-size:10px;color:#888;margin-top:1px}
.section-hd{font-size:12px;font-weight:700;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.overlay{background:rgba(0,0,0,.5);position:fixed;inset:0;display:none;align-items:flex-start;padding-top:16px;justify-content:center;z-index:100;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:16px;width:calc(100% - 24px);max-width:420px;margin:0 12px 24px}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:17px;font-weight:700}
.close-btn{width:32px;height:32px;border:none;background:#f0f0ea;border-radius:50%;cursor:pointer;font-size:20px;color:#666;display:flex;align-items:center;justify-content:center}
.profile-av-wrap{text-align:center;margin-bottom:16px}
.profile-name{font-size:20px;font-weight:700;text-align:center;margin-bottom:2px}
.profile-sub{font-size:13px;color:#888;text-align:center;margin-bottom:16px}
.profile-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.p-stat{background:#f5f5f0;border-radius:10px;padding:10px 4px;text-align:center}
.p-stat-v{font-size:19px;font-weight:700}
.p-stat-l{font-size:10px;color:#888;margin-top:2px}
.profile-matches{max-height:280px;overflow-y:auto}
.pm-item{padding:9px 0;border-bottom:1px solid #f0f0ea;font-size:13px}
.pm-item:last-child{border-bottom:none}
.pm-teams{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.pm-score{font-weight:700;padding:1px 7px;background:#f0f0ea;border-radius:7px;font-size:12px;flex-shrink:0}
.pm-result{display:inline-block;padding:1px 7px;border-radius:99px;font-size:11px;font-weight:700;flex-shrink:0}
.pm-win{background:#EAF3DE;color:#27500A}.pm-lose{background:#FCEBEB;color:#791F1F}
.bracket-wrap{overflow-x:auto;padding-bottom:8px}
.bracket{display:flex;gap:0;align-items:flex-start}
.round{display:flex;flex-direction:column;min-width:130px}
.round-title{font-size:10px;font-weight:700;color:#888;letter-spacing:.5px;text-transform:uppercase;text-align:center;padding:6px 8px;margin-bottom:4px}
.matches-col{display:flex;flex-direction:column;gap:0;flex:1}
.bracket-match{margin:6px 8px;background:#f5f5f0;border-radius:10px;overflow:hidden;border:1px solid #e8e8e0}
.bracket-match.active{border-color:#639922}
.b-player{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;font-size:13px;min-height:36px;gap:6px}
.b-player:first-child{border-bottom:1px solid #e8e8e0}
.b-player.winner{font-weight:700;background:#EAF3DE}
.b-player.loser{color:#aaa}
.b-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.b-score{font-weight:700;font-size:13px;min-width:20px;text-align:right}
.b-tbd{color:#bbb;font-style:italic}
.tourn-list-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0ea;cursor:pointer}
.tourn-list-item:last-child{border-bottom:none}
.tourn-name{font-size:14px;font-weight:600}
.tourn-sub{font-size:11px;color:#888;margin-top:1px}
.tourn-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;flex-shrink:0}
.tourn-active{background:#EAF3DE;color:#27500A}
.tourn-done{background:#f0f0ea;color:#888}
.online-dot{width:8px;height:8px;border-radius:50%;background:#639922;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.conn-bar{background:#fff8e1;color:#8a6200;font-size:12px;padding:7px 12px;border-radius:9px;margin-bottom:10px;display:none;align-items:center;gap:6px;border:1px solid #ffe082}
.conn-bar.show{display:flex}
.empty{text-align:center;padding:28px 0;color:#888;font-size:14px;line-height:1.7}
.loading{text-align:center;padding:28px 0;color:#aaa;font-size:14px}
.badge-guest{font-size:9px;background:#FAEEDA;color:#633806;padding:1px 5px;border-radius:99px;margin-left:3px}
</style>
</head>
<body>
<div class="app">
  <div id="conn-bar" class="conn-bar">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8"/></svg>
    Đang kết nối...
  </div>
  <div class="topbar">
    <div class="topbar-title"><span class="online-dot" id="online-dot" style="display:none"></span>Pickleball Petrolimex Đà Nẵng</div>
    <div class="public-badge">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="8" r="6"/><path d="M8 2c-2 2-3 4-3 6s1 4 3 6"/><path d="M8 2c2 2 3 4 3 6s-1 4-3 6"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
      Giải đấu
    </div>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="switchMain('rank',this)">Bảng xếp hạng</div>
    <div class="tab" onclick="switchMain('history',this)">Lịch sử</div>
    <div class="tab" onclick="switchMain('tournament',this)">Giải đấu</div>
  </div>
  <div id="live-section" style="display:none;margin-bottom:4px">
    <div class="section-hd"><span class="live-dot"></span>Trận đang diễn ra</div>
    <div id="live-list"></div>
    <div style="height:4px"></div>
  </div>
  <div id="pane-rank">
    <div class="card"><div id="lb-wrap"><div class="loading">Đang tải dữ liệu...</div></div></div>
    <div class="stat-row" id="global-stats"></div>
  </div>
  <div id="pane-history" style="display:none">
    <div class="card">
      <div class="card-title">Kết quả các trận</div>
      <div id="match-list"><div class="loading">Đang tải...</div></div>
    </div>
  </div>
  <div id="pane-tournament" style="display:none">
    <div class="card">
      <div class="card-title">Các giải đấu</div>
      <div id="tournament-list"><div class="empty">Chưa có giải đấu nào</div></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay-profile">
  <div class="modal">
    <div class="modal-head"><div class="modal-title">Hồ sơ</div><button class="close-btn" onclick="closeProfileModal()">×</button></div>
    <div id="profile-content"></div>
  </div>
</div>
<div class="overlay" id="overlay-bracket">
  <div class="modal" style="max-width:600px">
    <div class="modal-head"><div class="modal-title" id="bracket-title">Bracket</div><button class="close-btn" onclick="$('overlay-bracket').classList.remove('open')">×</button></div>
    <div id="bracket-content"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const FB={apiKey:"AIzaSyCjknrC0wbe1FZfFfNDu05d2peuWQwNyBo",authDomain:"pickleball-dn.firebaseapp.com",databaseURL:"https://pickleball-dn-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"pickleball-dn",storageBucket:"pickleball-dn.firebasestorage.app",messagingSenderId:"727063830298",appId:"1:727063830298:web:67e658c11f857a8b1116a3"};
const COLS=[['#EAF3DE','#27500A'],['#E6F1FB','#0C447C'],['#FAEEDA','#633806'],['#EEEDFE','#3C3489'],['#FAECE7','#712B13'],['#FBEAF0','#72243E'],['#E1F5EE','#085041'],['#FCEBEB','#791F1F'],['#F1EFE8','#444441'],['#EAF3DE','#3B6D11']];
let S={players:[],avatars:{},matches:[],liveMatches:[],tournaments:[]};
let currentPane='rank';
const col=i=>COLS[Math.abs(i)%COLS.length];
const ini=n=>n.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||n.slice(0,2).toUpperCase();
const $=id=>document.getElementById(id);
function hashCode(s){let h=0;for(let i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return h;}
function avHtml(name,size){
  const av=S.avatars[name],idx=S.players.findIndex(p=>p.name===name),c=col(idx>=0?idx:Math.abs(hashCode(name))%10);
  if(av)return`<img src="${av}" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:50%;flex-shrink:0"/>`;
  return`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${c[0]};color:${c[1]};display:flex;align-items:center;justify-content:center;font-size:${Math.floor(size*.34)}px;font-weight:700;flex-shrink:0">${ini(name)}</div>`;
}
const fbApp=initializeApp(FB);const db=getDatabase(fbApp);
$('conn-bar').classList.add('show');
onValue(ref(db,'players'),snap=>{const val=snap.val();if(val){S.players=Object.entries(val).sort((a,b)=>(a[1].order||0)-(b[1].order||0)).map(([k,v])=>({key:k,name:v.name}));refreshView();}});
onValue(ref(db,'avatars'),snap=>{S.avatars=snap.val()||{};refreshView();});
onValue(ref(db,'matches'),snap=>{
  const val=snap.val();S.matches=val?Object.entries(val).map(([k,v])=>({key:k,...v})).sort((a,b)=>(b.ts||0)-(a.ts||0)):[];
  $('conn-bar').classList.remove('show');$('online-dot').style.display='inline-block';refreshView();
});
onValue(ref(db,'liveMatches'),snap=>{
  const val=snap.val();S.liveMatches=val?Object.entries(val).map(([k,v])=>({key:k,...v})).sort((a,b)=>(a.ts||0)-(b.ts||0)):[];renderLiveSection();
});
onValue(ref(db,'tournaments'),snap=>{
  const val=snap.val();S.tournaments=val?Object.entries(val).map(([k,v])=>({key:k,...v})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)):[];
  if(currentPane==='tournament')renderTournamentList();
});
function refreshView(){if(currentPane==='rank')renderLB();if(currentPane==='history')renderHistory();if(currentPane==='tournament')renderTournamentList();}
window.switchMain=function(pane,el){
  currentPane=pane;['rank','history','tournament'].forEach(p=>{$('pane-'+p).style.display=p===pane?'block':'none';});
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');
  $('live-section').style.display=pane==='rank'&&S.liveMatches.length?'block':'none';refreshView();
};
function renderLiveSection(){
  const sec=$('live-section'),list=$('live-list');
  if(!S.liveMatches.length){sec.style.display='none';return;}
  if(currentPane==='rank')sec.style.display='block';
  list.innerHTML=S.liveMatches.map(m=>{
    const t1=m.t1.map(p=>p.name).join(' & '),t2=m.t2.map(p=>p.name).join(' & '),hasScore=m.s1!==undefined&&m.s2!==undefined;
    const scoreHtml=hasScore?`<div class="live-score-box"><div class="live-score-val">${m.s1}<span style="font-size:14px;font-weight:400;color:#aaa;margin:0 3px">:</span>${m.s2}</div><div class="live-score-lbl">đang đấu</div></div>`:`<div class="live-score-box"><div style="font-size:11px;color:#bbb;padding:4px 0">Chờ bắt đầu</div></div>`;
    return`<div class="live-card ${hasScore?'has-score':''}"><div class="live-badge"><span class="live-dot"></span>Đang diễn ra</div><div class="live-teams"><div class="live-team"><div class="live-team-name">${t1}</div></div>${scoreHtml}<div class="live-team" style="text-align:right"><div class="live-team-name">${t2}</div></div></div></div>`;
  }).join('');
}
function getStats(){
  const m={};S.players.forEach(p=>{m[p.name]={name:p.name,w:0,l:0,isGuest:false};});
  S.matches.forEach(match=>{
    const win=match.winner===1?match.t1:match.t2,lose=match.winner===1?match.t2:match.t1;
    win.forEach(p=>{if(!m[p.name])m[p.name]={name:p.name,w:0,l:0,isGuest:!!p.guest};m[p.name].w++;});
    lose.forEach(p=>{if(!m[p.name])m[p.name]={name:p.name,w:0,l:0,isGuest:!!p.guest};m[p.name].l++;});
  });
  return Object.values(m).map(v=>{const g=v.w+v.l;return{name:v.name,w:v.w,l:v.l,g,pct:g>0?Math.round(v.w/g*100):null,isGuest:v.isGuest};});
}
const pctCls=p=>p===null?'pct-none':p>=60?'pct-high':p>=40?'pct-mid':'pct-low';
function renderLB(){
  const stats=getStats().sort((a,b)=>{if(a.pct===null&&b.pct===null)return b.g-a.g;if(a.pct===null)return 1;if(b.pct===null)return -1;return b.pct-a.pct||b.w-a.w||b.g-a.g;});
  const played=stats.filter(s=>s.g>0),notPlayed=stats.filter(s=>s.g===0&&!s.isGuest),medals=['🥇','🥈','🥉'],wrap=$('lb-wrap');
  if(!played.length){wrap.innerHTML='<div class="empty">Chưa có trận nào kết thúc.</div>';$('global-stats').innerHTML='';return;}
  let html=`<table class="lb-table"><thead><tr><th class="col-rank"></th><th class="col-name">Tên</th><th class="col-num">Trận</th><th class="col-num" style="color:#27500A">Thắng</th><th class="col-num" style="color:#A32D2D">Thua</th><th class="col-pct">Tỷ lệ</th></tr></thead><tbody>`;
  played.forEach((s,ri)=>{
    const nm=s.name.replace(/'/g,"\\'"),gb=s.isGuest?`<span class="badge-guest">khách</span>`:'';
    html+=`<tr><td class="col-rank" style="text-align:center">${ri<3?`<span style="font-size:17px">${medals[ri]}</span>`:`<span style="font-size:13px;color:#aaa">${ri+1}</span>`}</td><td class="col-name"><div class="player-cell" onclick="openProfile('${nm}')">${avHtml(s.name,32)}<span class="p-name-txt" style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}${gb}</span></div></td><td class="col-num">${s.g}</td><td class="col-num" style="color:#27500A;font-weight:700">${s.w}</td><td class="col-num" style="color:#A32D2D">${s.l}</td><td class="col-pct"><span class="pct-badge ${pctCls(s.pct)}">${s.pct!==null?s.pct+'%':'—'}</span></td></tr>`;
  });
  notPlayed.forEach(s=>{const nm=s.name.replace(/'/g,"\\'");html+=`<tr><td class="col-rank"></td><td class="col-name"><div class="player-cell" onclick="openProfile('${nm}')"><div style="opacity:.35">${avHtml(s.name,32)}</div><span style="font-size:13px;color:#aaa">${s.name}</span></div></td><td class="col-num" style="color:#aaa">0</td><td class="col-num" style="color:#aaa">0</td><td class="col-num" style="color:#aaa">0</td><td class="col-pct"><span class="pct-badge pct-none">—</span></td></tr>`;});
  html+='</tbody></table>';wrap.innerHTML=html;
  const top=played[0];$('global-stats').innerHTML=`<div class="stat-c"><div class="stat-l">Tổng trận đã đấu</div><div class="stat-v">${S.matches.length}</div></div><div class="stat-c"><div class="stat-l">Đang dẫn đầu</div><div class="stat-v" style="font-size:15px">${top?top.name:'—'}</div><div style="font-size:11px;color:#888;margin-top:2px">${top?top.w+' trận thắng':''}</div></div>`;
}
function renderHistory(){
  const el=$('match-list');if(!S.matches.length){el.innerHTML='<div class="empty">Chưa có trận nào!</div>';return;}
  el.innerHTML=S.matches.map(m=>{const t1=m.t1.map(p=>p.name).join(' & '),t2=m.t2.map(p=>p.name).join(' & ');return`<div class="match-item"><div class="match-teams"><span style="flex:1;${m.winner===1?'font-weight:700':'color:#888'}">${t1}</span><span class="m-score">${m.s1}–${m.s2}</span><span style="flex:1;text-align:right;${m.winner===2?'font-weight:700':'color:#888'}">${t2}</span></div><div style="display:flex;justify-content:space-between;margin-top:3px"><span class="m-time">${m.time||''}</span><span class="m-winner">Thắng: ${m.winner===1?t1:t2}</span></div></div>`;}).join('');
}
function renderTournamentList(){
  const el=$('tournament-list');if(!S.tournaments.length){el.innerHTML='<div class="empty">Chưa có giải đấu nào</div>';return;}
  el.innerHTML=S.tournaments.map(t=>`<div class="tourn-list-item" onclick="openBracket('${t.key}')"><div style="flex:1;min-width:0"><div class="tourn-name">${t.name}</div><div class="tourn-sub">${t.players.length} người · ${t.createdTime||''}</div></div><span class="tourn-badge ${t.status==='active'?'tourn-active':'tourn-done'}">${t.status==='active'?'Đang diễn ra':'Kết thúc'}</span></div>`).join('');
}
window.openBracket=function(key){
  const t=S.tournaments.find(t=>t.key===key);if(!t)return;
  $('bracket-title').textContent=t.name;renderBracketView(t);$('overlay-bracket').classList.add('open');
};
function getRoundNames(total){const names=[];for(let i=0;i<total;i++){const r=total-i;if(r===1)names.push('Chung kết');else if(r===2)names.push('Bán kết');else if(r===3)names.push('Tứ kết');else names.push(`Vòng ${i+1}`);}return names;}
function renderBracketView(t){
  const el=$('bracket-content'),rounds=t.rounds,rn=getRoundNames(rounds.length);
  let html=`<div class="bracket-wrap"><div class="bracket">`;
  rounds.forEach((round,ri)=>{
    html+=`<div class="round"><div class="round-title">${rn[ri]}</div><div class="matches-col">`;
    round.forEach(match=>{
      const p1=match.p1,p2=match.p2,w=match.winner;
      html+=`<div class="bracket-match ${p1&&p2?'active':''}"><div class="b-player ${w&&w===p1?'winner':w?'loser':''}"><span class="b-name">${p1||'<span class="b-tbd">TBD</span>'}</span>${match.s1!==null&&match.s1!==undefined?`<span class="b-score">${match.s1}</span>`:''}</div><div class="b-player ${w&&w===p2?'winner':w?'loser':''}"><span class="b-name">${p2||'<span class="b-tbd">TBD</span>'}</span>${match.s2!==null&&match.s2!==undefined?`<span class="b-score">${match.s2}</span>`:''}</div></div>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div></div>`;
  const done=rounds[rounds.length-1][0].winner;
  if(done)html+=`<div style="text-align:center;padding:16px 0;font-size:15px;font-weight:700;color:#27500A">🏆 Vô địch: ${done}</div>`;
  el.innerHTML=html;
}
function getStreak(name,matches){if(!matches.length)return'Chưa thi đấu';let streak=0,type=null;for(const m of matches){const inT1=m.t1.some(p=>p.name===name),won=(inT1&&m.winner===1)||(!inT1&&m.winner===2);if(type===null){type=won;streak=1;}else if(won===type)streak++;else break;}if(streak<=1)return type?'1 trận thắng gần nhất':'1 trận thua gần nhất';return type?`${streak} trận thắng liên tiếp`:`${streak} trận thua liên tiếp`;}
window.openProfile=function(name){
  const stats=getStats().find(s=>s.name===name)||{name,w:0,l:0,g:0,pct:null};
  const pm=S.matches.filter(m=>[...m.t1,...m.t2].some(p=>p.name===name));
  const idx=S.players.findIndex(p=>p.name===name),c=col(idx>=0?idx:0);
  const av=S.avatars[name]?`<img src="${S.avatars[name]}" style="width:80px;height:80px;object-fit:cover;border-radius:50%"/>`:`<div style="width:80px;height:80px;border-radius:50%;background:${c[0]};color:${c[1]};display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;margin:0 auto">${ini(name)}</div>`;
  const isGuest=!S.players.find(p=>p.name===name);
  const mh=!pm.length?'<div style="text-align:center;padding:16px;color:#aaa;font-size:13px">Chưa có trận nào</div>':pm.map(m=>{const t1=m.t1.map(p=>p.name).join(' & '),t2=m.t2.map(p=>p.name).join(' & '),inT1=m.t1.some(p=>p.name===name),won=(inT1&&m.winner===1)||(!inT1&&m.winner===2),myS=inT1?m.s1:m.s2,oppS=inT1?m.s2:m.s1,opp=inT1?t2:t1,myT=inT1?t1:t2;return`<div class="pm-item"><div class="pm-teams"><span class="pm-result ${won?'pm-win':'pm-lose'}">${won?'Thắng':'Thua'}</span><span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${myT} vs ${opp}</span><span class="pm-score">${myS}–${oppS}</span></div><div style="font-size:11px;color:#aaa;margin-top:1px">${m.time||''}</div></div>`;}).join('');
  $('profile-content').innerHTML=`<div class="profile-av-wrap">${av}<div class="profile-name">${name}${isGuest?'<span class="badge-guest" style="font-size:11px;vertical-align:middle;margin-left:4px">khách</span>':''}</div><div style="font-size:13px;color:#888;text-align:center;margin-bottom:16px">${getStreak(name,pm)}</div></div><div class="profile-stats"><div class="p-stat"><div class="p-stat-v">${stats.g}</div><div class="p-stat-l">Số trận</div></div><div class="p-stat"><div class="p-stat-v" style="color:#27500A">${stats.w}</div><div class="p-stat-l">Thắng</div></div><div class="p-stat"><div class="p-stat-v" style="color:#A32D2D">${stats.l}</div><div class="p-stat-l">Thua</div></div><div class="p-stat"><div class="p-stat-v ${pctCls(stats.pct)}" style="font-size:16px">${stats.pct!==null?stats.pct+'%':'—'}</div><div class="p-stat-l">Tỷ lệ</div></div></div><div class="card-title">Lịch sử (${pm.length} trận)</div><div class="profile-matches">${mh}</div>`;
  $('overlay-profile').classList.add('open');
};
window.closeProfileModal=()=>$('overlay-profile').classList.remove('open');
</script>
